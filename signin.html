<!DOCTYPE html>
<html class="no-js">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>Sign In - Wild Rydes</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width">

        <link rel="stylesheet" href="css/font.css">
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/index.css"> <link rel="stylesheet" href="css/message.css">
    </head>
    <body>
        <header>
          <img src="images/logo.png">
        </header>

        <section class="form-wrap">
            <h1>Sign In</h1>
            <div style="text-align: center;">
                <p>Sign in to request your mythical ride.</p>
                <button id="signInBtn" class="btn" style="width:100%; padding:15px; background:#f90; color:#fff; border:none; cursor:pointer; font-weight:bold; border-radius:25px;">
                  SIGN IN
                </button>
            </div>

            </section>

        <script src="js/vendor/jquery-3.1.0.js"></script>
        <script src="js/vendor/bootstrap.min.js"></script>
        <script src="js/vendor/aws-cognito-sdk.min.js"></script>
        <script src="js/vendor/amazon-cognito-identity.min.js"></script>
        <script src="js/config.js"></script>
        <script src="js/cognito-auth.js"></script>
        
        <script type="module">
            import { userManager } from "./js/main.js";
            document.getElementById("signInBtn")?.addEventListener("click", async () => {
                try { await userManager.signinRedirect(); } 
                catch (err) { console.error(err); }
            });
        </script>
    </body>
</html>
